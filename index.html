<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NSPlus To Markdown</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <main class="app">
        <section class="hero" aria-labelledby="hero-title">
          <div class="hero-copy">
            <p class="eyebrow"></p>
            <h1 id="hero-title">NSPlus to Markdown</h1>
            <!--<p class="lede"></p>-->
          </div>
          <!--<div class="hero-chip"></div>-->
        </section>

        <section
          class="workspace"
          id="workspace-container"
          aria-label="Decodificador NSPlus"
          data-state="empty"
        >
          <article class="drop-card" id="drop-card-section">
            <div
              id="drop-zone"
              class="drop-zone"
              tabindex="0"
              role="button"
              aria-label="Subir archivo NSPlus"
              aria-describedby="drop-help"
            >
              <input
                id="file-input"
                class="file-input"
                type="file"
                accept=".nsplus,application/json,text/plain"
              />

              <div class="drop-icon" aria-hidden="true">
                <span></span>
              </div>
              <h2>Arrastrá acá el .nsplus</h2>
              <p id="drop-help">ó</p>
              <button
                class="primary-action"
                type="button"
                id="pick-file-button"
              >
                Selecciona el archivo
              </button>
            </div>
          </article>

          <aside
            class="notes-panel"
            id="preview-panel-section"
            aria-label="Vista previa del markdown"
            hidden
          >
            <!--<p class="eyebrow">Vista previa</p>-->
            <div class="panel-header">
              <h2>Renderizado</h2>
              <button
                id="copy-markdown-btn"
                class="copy-btn"
                title="Copiar markdown"
              >
                <svg
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path
                    d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"
                  ></path>
                  <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
                </svg>
                Copiar
              </button>
            </div>
            <!--<p class="preview-copy">
            </p>-->
            <div
              id="preview-empty"
              class="preview-empty"
              role="status"
              aria-live="polite"
            >
              <p class="preview-empty-kicker">Sin archivo cargado</p>
              <p id="preview-empty-message" class="preview-empty-message">
                Elegí o arrastrá un archivo .nsplus para verlo convertido a
                markdown
              </p>
            </div>
            <iframe
              id="preview-frame"
              class="preview-frame"
              title="Vista previa del markdown"
              hidden
            ></iframe>
          </aside>
        </section>
      </main>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
